<div class="container mat-elevation-z8">
    <h1 class="full-width">Criando chamado</h1>
    <img class="full-width" src="assets\img\chamado-create.svg" alt="Chamado img">

    <form class="form">
        <mat-form-field class="full-width" appearance="outline">
            <mat-label>Título do chamado</mat-label>
            <input matInput placeholder="Ex. Trocar bateria de laptop" [formControl]="titulo" required [(ngModel)]="chamado.titulo" name="titulo">
        </mat-form-field>
    </form>

    <div class="status-priority">
        <mat-form-field appearance="outline">
            <mat-label>Selecione um status</mat-label>
            <mat-select [formControl]="status" required [(ngModel)]="chamado.status" name="status">
                <mat-option value="0">ABERTO</mat-option>
                <mat-option value="1">EM ANDAMENTO</mat-option>
                <mat-option value="2">ENCERRADO</mat-option>
            </mat-select>
        </mat-form-field>
        <mat-form-field appearance="outline">
            <mat-label>Selecione uma prioridade</mat-label>
            <mat-select [formControl]="priority" required [(ngModel)]="chamado.prioridade" name="prioridade">
                <mat-option value="0">BAIXA</mat-option>
                <mat-option value="1">MEDIA</mat-option>
                <mat-option value="2">ALTA</mat-option>
            </mat-select>
        </mat-form-field>
    </div>

    <div class="tecnico">
        <mat-form-field class="full-width" appearance="outline">
            <mat-label>Selecione uma técnico</mat-label>
            <mat-select [formControl]="technical" required [(ngModel)]="chamado.tecnico" name="tecnico">
                <mat-option *ngFor="let tecnico of tecnicos" value="{{tecnico.id}}">{{tecnico.nome}}</mat-option>                
            </mat-select>
        </mat-form-field>
    </div>

    <div class="cleinte">
        <mat-form-field class="full-width" appearance="outline">
            <mat-label>Selecione um cliente</mat-label>
            <mat-select [formControl]="customer" required [(ngModel)]="chamado.cliente" name="cliente">
                <mat-option *ngFor="let cliente of clientes" value="{{cliente.id}}">{{cliente.nome}}</mat-option>
            </mat-select>
        </mat-form-field>
    </div>

    <form class="form">        
        <mat-form-field class="full-width" appearance="outline">
            <mat-label>Deixa uma observação</mat-label>
            <textarea matInput placeholder="Ex. Trocar bateria de laptop" class="observacao" [formControl]="observation" required [(ngModel)]="chamado.observacoes" name="observacoes"></textarea>
        </mat-form-field>
    </form>

    <button (click)="create()" [disabled]="!validateFields()" class="full-width mat-elevation-z4" mat-raised-button color="primary">Criar Chamado</button>
    <button routerLink="../" class="full-width mat-elevation-z4" mat-stroked-button color="warn">Cancelar</button>

    <p class="full-width">Desenvolvido por Alexander Oliveira</p>
</div>
