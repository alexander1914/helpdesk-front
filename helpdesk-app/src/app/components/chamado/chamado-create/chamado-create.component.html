<div class="container mat-elevation-z8">
    <h1 class="full-width">Criando chamado</h1>
    <img class="full-width" src="assets\img\chamado-create.svg" alt="Chamado img">

    <form class="form">
        <mat-form-field class="full-width" appearance="outline">
            <mat-label>Título do chamado</mat-label>
            <input matInput placeholder="Ex. Trocar bateria de laptop">
        </mat-form-field>
    </form>

    <div class="status-priority">
        <mat-form-field appearance="outline">
            <mat-label>Selecione um status</mat-label>
            <mat-select>
                <mat-option value="0">ABERTO</mat-option>
                <mat-option value="1">EM ANDAMENTO</mat-option>
                <mat-option value="2">ENCERRADO</mat-option>
            </mat-select>
        </mat-form-field>
        <mat-form-field appearance="outline">
            <mat-label>Selecione uma prioridade</mat-label>
            <mat-select>
                <mat-option value="0">BAIXA</mat-option>
                <mat-option value="1">MEDIA</mat-option>
                <mat-option value="2">ALTA</mat-option>
            </mat-select>
        </mat-form-field>
    </div>

    <div class="tecnico">
        <mat-form-field class="full-width" appearance="outline">
            <mat-label>Selecione uma técnico</mat-label>
            <mat-select>
                <mat-option value="0">ALEXANDER</mat-option>
                <mat-option value="1">SAMUEL</mat-option>
                <mat-option value="2">WELLINGTON</mat-option>
            </mat-select>
        </mat-form-field>
    </div>

    <div class="cleinte">
        <mat-form-field class="full-width" appearance="outline">
            <mat-label>Selecione um cliente</mat-label>
            <mat-select>
                <mat-option value="0">BRUNA</mat-option>
                <mat-option value="1">EDUARDA</mat-option>
                <mat-option value="2">MELISSA</mat-option>
            </mat-select>
        </mat-form-field>
    </div>

    <form class="form">        
        <mat-form-field class="full-width" appearance="outline">
            <mat-label>Deixa uma observação</mat-label>
            <textarea matInput placeholder="Ex. Trocar bateria de laptop" class="observacao"></textarea>
        </mat-form-field>
    </form>

    <button class="full-width mat-elevation-z4" mat-raised-button color="primary">Criar Chamado</button>
    <button class="full-width mat-elevation-z4" mat-stroked-button color="warn">Cancelar</button>

    <p class="full-width">Desenvolvido por Alexander Oliveira</p>
</div>
